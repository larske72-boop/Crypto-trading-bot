# Crypto Trading Bot - Configuratie

# ── Modus ────────────────────────────────────────────────────────────────────
mode: paper

# ── Exchange ──────────────────────────────────────────────────────────────────
exchange: kraken
timeframe: 15m

# ── Symbolen — bot scant alles en kiest de sterkste trend ────────────────────
symbols:
  - BTC/USD
  - ETH/USD
  - SOL/USD
  - XRP/USD
  - ADA/USD
  - DOT/USD
  - LTC/USD
  - AVAX/USD

# ── Strategie-parameters ─────────────────────────────────────────────────────
strategy:
  ema_fast: 5
  ema_slow: 13
  rsi_period: 10
  rsi_buy_threshold: 40
  rsi_sell_threshold: 50
  atr_period: 10
  atr_sl_multiplier: 2.0
  atr_tp_multiplier: 3.0

# ── Risicobeheer ─────────────────────────────────────────────────────────────
risk:
  risk_per_trade_pct: 1.0
  max_position_pct: 20.0
  max_positions: 3        # maximaal 3 open posities tegelijk

# ── Paper-trading staat ───────────────────────────────────────────────────────
paper:
  state_file: data/paper_state.json
  starting_balance: 1000.0

# ── Continue modus ───────────────────────────────────────────────────────────
loop:
  poll_seconds: 60
